permissions:
  contents: write
  packages: write

name: Build, Analyze, and Publish (Maven Central + GitHub Packages) for tagged release

on:
  push:
    tags:
      - 'v*'    # e.g., v1.0.0 – run on version tags
  workflow_dispatch:  # allow manual trigger

jobs:
  release:
    name: Verify, Analyze, and Publish
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN:         ${{ secrets.GITHUB_TOKEN }}
      GH_TOKEN:             ${{ secrets.GH_TOKEN }}
      GPG_PRIVATE_KEY:      ${{ secrets.GPG_PRIVATE_KEY }}
      MAVEN_CENTRAL_USER:   ${{ secrets.MAVEN_CENTRAL_USER }}
      MAVEN_CENTRAL_TOKEN:  ${{ secrets.MAVEN_CENTRAL_TOKEN }}
      MAVEN_GPG_KEYNAME:    ${{ secrets.MAVEN_GPG_KEYNAME }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
      SONAR_TOKEN:          ${{ secrets.SONAR_TOKEN }}
      SONAR_ORG:            ${{ secrets.SONAR_ORG }}
      NVD_API_EKY:          ${{ secrets.NVD_API_KEY }}

    steps:
      # ============================================================
      # 1️⃣ Checkout code
      # Uses the built-in GITHUB_TOKEN (read-only checkout)
      # ============================================================
      - name: Checkout source
        uses: actions/checkout@v4

      # ============================================================
      # 2️⃣ Setup Java
      # Caches Maven dependencies for faster runs
      # ============================================================
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_USER
          server-password: MAVEN_CENTRAL_TOKEN
          gpg-private-key: ${{ env.GPG_PRIVATE_KEY }}
          gpg-passphrase:  MAVEN_GPG_PASSPHRASE

      # ============================================================
      # 3️⃣ Import your GPG private key for signing artifacts
      # Uses GPG_PRIVATE_KEY + MAVEN_GPG_KEYNAME + MAVEN_GPG_PASSPHRASE
      # ============================================================
      - name: Import GPG private key
        run: |
          echo "${{ env.GPG_PRIVATE_KEY }}" | gpg --batch --quiet --import || true
          
          echo "🔍 Checking for imported GPG key: ${{ env.MAVEN_GPG_KEYNAME }}"
          gpg --list-secret-keys --keyid-format=long
          
          # Extract imported key IDs (in uppercase for comparison)
          IMPORTED_KEY_IDS=$(gpg --list-secret-keys --keyid-format=long | grep sec | awk '{print $2}' | cut -d'/' -f2 | tr '[:lower:]' '[:upper:]')
          EXPECTED_KEY_ID=$(echo "${{ env.MAVEN_GPG_KEYNAME }}" | tr '[:lower:]' '[:upper:]')
          
          echo "✅ Expected Key ID: $EXPECTED_KEY_ID"
          echo "🔑 Imported Keys: $IMPORTED_KEY_IDS"
          
          MATCH_FOUND=false
          for KEY in $IMPORTED_KEY_IDS; do
          if [ "$KEY" = "$EXPECTED_KEY_ID" ]; then
             MATCH_FOUND=true
             echo "✅ GPG key match confirmed: $KEY"
             break
          fi
          done
          
          if [ "$MATCH_FOUND" = false ]; then
             echo "❌ ERROR: Imported GPG key does not match expected key ID: $EXPECTED_KEY_ID"
             exit 2
          fi

      # ============================================================
      # 4️⃣ Build and test locally
      # Uses only Maven config – does not deploy yet
      # ============================================================
      - name: Build and verify
        run: mvn -B clean verify -P release-profile

      # ============================================================
      # 5️⃣ (Optional) Static analysis with SonarCloud
      # Uses SONAR_TOKEN + SONAR_ORG for external reporting
      # ============================================================
      - name: SonarCloud analysis
        if: ${{ env.SONAR_TOKEN && env.SONAR_ORG }}
        run: |
          mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.organization=${{ env.SONAR_ORG }} \
            -Dsonar.projectKey=io.github.venkateshamurthy:dynamic-enum \
            -Dsonar.branch.name=${GITHUB_REF_NAME} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${{ env.SONAR_TOKEN }} \
            -Dsonar.qualitygate.wait=true

      # ============================================================
      # 6️⃣ Deploy to Maven Central
      # Uses MAVEN_CENTRAL_USER + MAVEN_CENTRAL_TOKEN
      # and your GPG credentials for signing.
      # ============================================================
      - name: Deploy to Maven Central
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "🔖 Releasing version: $VERSION from base POM (eg: 1.0.0-SNAPSHOT)"
          mvn -B versions:set -DnewVersion=$VERSION
          mvn -B clean deploy  -Psecurity-scan

      # ============================================================
      # 7️⃣ Deploy to GitHub Packages
      # Uses GH_TOKEN (your personal PAT) because
      # built-in GITHUB_TOKEN lacks write:packages permission.
      # ============================================================
      - name: Deploy to GitHub Packages
        run: |
          mvn -B deploy \
            -DaltDeploymentRepository=github::default::https://maven.pkg.github.com/${{ github.repository }}

      # ============================================================
      # 8️⃣ Generate Javadocs
      # Uses the built-in GITHUB_TOKEN because it is injected by GitHub itself
      # and further automatically has write access to the current repo’s gh-pages branch.
      # ============================================================
      - name: Generate Javadocs
        run: mvn -B javadoc:javadoc

      - name: Publish Javadocs to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          # ✅ Use the built-in token — no need to create in secrets
          github_token: ${{ env.GITHUB_TOKEN }}
          publish_dir: ./target/site/apidocs
          enable_jekyll: false
          commit_message: "Update API docs for ${{ github.ref_name }}"